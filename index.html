<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AniSub Uploader</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Hind Siliguri',sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#0d1b2a 50%,#0a0a1a 100%);min-height:100vh;color:#fff;padding:15px}
h1{text-align:center;font-size:26px;margin-bottom:25px;background:linear-gradient(90deg,#00d4ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px;margin-bottom:16px}
.card h2{font-size:16px;margin-bottom:14px;color:#00d4ff}
input,textarea,select{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:11px 14px;color:#fff;font-family:'Hind Siliguri',sans-serif;font-size:14px;margin-bottom:10px;outline:none;transition:border 0.3s}
input:focus,textarea:focus,select:focus{border-color:#00d4ff;box-shadow:0 0 10px rgba(0,212,255,0.2)}
select option{background:#1a1a2e}
.btn{width:100%;padding:13px;border:none;border-radius:12px;font-family:'Hind Siliguri',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;margin-bottom:8px}
.btn-primary{background:linear-gradient(90deg,#00d4ff,#7b2ff7);color:#fff;box-shadow:0 0 20px rgba(0,212,255,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,212,255,0.5)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-extract{background:linear-gradient(90deg,#f7971e,#ffd200);color:#000}
.tabs{display:flex;gap:6px;margin-bottom:14px}
.tab{flex:1;padding:9px 5px;border:1px solid rgba(255,255,255,0.15);border-radius:10px;background:transparent;color:#aaa;font-family:'Hind Siliguri',sans-serif;cursor:pointer;font-size:12px;transition:all 0.3s}
.tab.active{background:rgba(0,212,255,0.1);border-color:#00d4ff;color:#00d4ff}
.tab-content{display:none}
.tab-content.active{display:block}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.setting-group label{font-size:12px;color:#aaa;display:block;margin-bottom:5px}
.preview-box{background:#1a1a2e;border-radius:12px;height:100px;display:flex;align-items:flex-end;justify-content:center;padding:12px;margin-bottom:10px;position:relative}
.preview-text{font-size:18px;text-align:center;transition:all 0.3s;text-shadow:1px 1px 2px #000}
.progress-section{display:none}
.progress-section.active{display:block}
.steps{display:flex;justify-content:space-between;margin-bottom:15px}
.step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1}
.step-icon{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(255,255,255,0.2);transition:all 0.5s}
.step-icon.active{background:rgba(0,212,255,0.2);border-color:#00d4ff;box-shadow:0 0 15px rgba(0,212,255,0.4);animation:pulse 1.5s infinite}
.step-icon.done{background:rgba(0,255,100,0.2);border-color:#00ff64;box-shadow:0 0 15px rgba(0,255,100,0.3)}
.step-label{font-size:10px;color:#aaa;text-align:center}
.step-line{flex:1;height:2px;background:rgba(255,255,255,0.1);align-self:center;margin-top:-20px}
.step-line.done{background:linear-gradient(90deg,#00d4ff,#7b2ff7)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.progress-bar-wrap{background:rgba(255,255,255,0.1);border-radius:10px;height:8px;margin-bottom:12px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#00d4ff,#7b2ff7);border-radius:10px;transition:width 0.5s;width:0%}
.status-msg{text-align:center;font-size:15px;margin-bottom:12px;color:#00d4ff;min-height:24px}
.log-box{background:rgba(0,0,0,0.4);border-radius:10px;padding:12px;font-size:11px;color:#0f0;font-family:monospace;height:100px;overflow-y:auto;border:1px solid rgba(0,255,0,0.2)}
.result-box{display:none;background:rgba(0,255,100,0.1);border:1px solid #00ff64;border-radius:12px;padding:15px;text-align:center;margin-top:12px}
.result-box a{color:#00ff64;font-size:16px;font-weight:600;text-decoration:none}
.error-box{display:none;background:rgba(255,50,50,0.1);border:1px solid #ff3232;border-radius:12px;padding:15px;margin-top:12px;font-size:13px;color:#ff8080}
.task-id-box{text-align:center;font-size:11px;color:#666;margin-bottom:10px}
</style>
</head>
<body>
<h1>🎬 AniSub Uploader</h1>

<!-- Section 1: Auto Extract -->
<div class="card">
  <h2>🔍 অটো এক্সট্র্যাক্ট</h2>
  <input type="url" id="page_url" placeholder="Episode page URL দিন...">
  <button class="btn btn-extract" onclick="extractLinks()">🔍 অটো এক্সট্র্যাক্ট</button>
</div>

<!-- Section 2: Video -->
<div class="card">
  <h2>🎥 ভিডিও</h2>
  <input type="url" id="m3u8_url" placeholder="m3u8 video URL...">
</div>

<!-- Section 3: Subtitle -->
<div class="card">
  <h2>📝 সাবটাইটেল</h2>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('upload')">📁 আপলোড</button>
    <button class="tab" onclick="switchTab('url')">🔗 URL</button>
    <button class="tab" onclick="switchTab('translate')">🌐 অনুবাদ</button>
  </div>
  <div class="tab-content active" id="tab-upload">
    <input type="file" id="subtitle_file" accept=".srt,.vtt">
  </div>
  <div class="tab-content" id="tab-url">
    <input type="url" id="subtitle_url" placeholder="SRT/VTT file URL...">
  </div>
  <div class="tab-content" id="tab-translate">
    <input type="file" id="translate_file" accept=".srt,.vtt">
    <input type="url" id="translate_url" placeholder="অথবা English SRT URL...">
    <select id="translate_engine">
      <option value="google">🔤 Google Translate</option>
      <option value="gemini">✨ Gemini AI</option>
    </select>
  </div>
</div>

<!-- Section 4: Subtitle Settings -->
<div class="card">
  <h2>⚙️ সাবটাইটেল সেটিংস</h2>
  <div class="preview-box" id="preview_box">
    <span class="preview-text" id="preview_text">বাংলা সাবটাইটেল এখানে দেখাবে</span>
  </div>
  <div class="settings-grid">
    <div class="setting-group">
      <label>📍 অবস্থান</label>
      <select id="position" onchange="updatePreview()">
        <option value="bottom">নিচে</option>
        <option value="middle">মাঝে</option>
        <option value="top">উপরে</option>
      </select>
    </div>
    <div class="setting-group">
      <label>🔤 ফন্ট সাইজ</label>
      <select id="font_size" onchange="updatePreview()">
        <option value="18">ছোট (18)</option>
        <option value="24" selected>মাঝারি (24)</option>
        <option value="32">বড় (32)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>🎨 রঙ</label>
      <select id="font_color" onchange="updatePreview()">
        <option value="white">সাদা</option>
        <option value="yellow">হলুদ</option>
        <option value="cyan">সায়ান</option>
      </select>
    </div>
    <div class="setting-group">
      <label>🖋️ ব্যাকগ্রাউন্ড</label>
      <select id="background" onchange="updatePreview()">
        <option value="none">কোনো নেই</option>
        <option value="semi">আধা-স্বচ্ছ</option>
        <option value="black">কালো বক্স</option>
      </select>
    </div>
    <div class="setting-group">
      <label>🅱️ স্টাইল</label>
      <select id="font_style" onchange="updatePreview()">
        <option value="normal">Normal</option>
        <option value="bold">Bold</option>
        <option value="italic">Italic</option>
      </select>
    </div>
    <div class="setting-group">
      <label>🔡 ফন্ট</label>
      <select id="font_name" onchange="updatePreview()">
        <option value="Noto Sans Bengali">Noto Sans Bengali</option>
        <option value="Kalpurush">Kalpurush</option>
        <option value="SolaimanLipi">SolaimanLipi</option>
        <option value="Mitra">Mitra</option>
      </select>
    </div>
  </div>
</div>

<!-- Section 5: Telegram -->
<div class="card">
  <h2>📲 টেলিগ্রাম সেটিংস</h2>
  <input type="text" id="video_title" placeholder="ভিডিও টাইটেল...">
  <textarea id="caption" placeholder="ক্যাপশন (ঐচ্ছিক)..." rows="3" style="resize:none"></textarea>
</div>

<!-- Upload Button -->
<button class="btn btn-primary" id="upload_btn" onclick="startUpload()">✅ আপলোড করো</button>

<!-- Progress Section -->
<div class="card progress-section" id="progress_section">
  <h2>📊 অগ্রগতি</h2>
  <div class="task-id-box" id="task_id_display"></div>
  <div class="steps">
    <div class="step">
      <div class="step-icon" id="step1">⏳</div>
      <div class="step-label">ডাউনলোড</div>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step">
      <div class="step-icon" id="step2">🌐</div>
      <div class="step-label">অনুবাদ</div>
    </div>
    <div class="step-line" id="line2"></div>
    <div class="step">
      <div class="step-icon" id="step3">🎬</div>
      <div class="step-label">প্রসেসিং</div>
    </div>
    <div class="step-line" id="line3"></div>
    <div class="step">
      <div class="step-icon" id="step4">📤</div>
      <div class="step-label">আপলোড</div>
    </div>
    <div class="step-line" id="line4"></div>
    <div class="step">
      <div class="step-icon" id="step5">✅</div>
      <div class="step-label">সম্পন্ন</div>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress_bar"></div></div>
  <div class="status-msg" id="status_msg">⏳ শুরু হচ্ছে...</div>
  <div class="log-box" id="log_box"></div>
  <div class="result-box" id="result_box">
    <p style="margin-bottom:8px">🎉 টেলিগ্রামে আপলোড সম্পন্ন!</p>
    <a id="result_link" href="#" target="_blank">📺 চ্যানেলে দেখুন →</a>
  </div>
  <div class="error-box" id="error_box"></div>
</div>

<script>
let currentTab = 'upload';
let currentTaskId = null;
let eventSource = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['upload','url','translate'][i] === tab);
  });
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

function updatePreview() {
  const color = document.getElementById('font_color').value;
  const size = document.getElementById('font_size').value;
  const style = document.getElementById('font_style').value;
  const bg = document.getElementById('background').value;
  const position = document.getElementById('position').value;
  const pt = document.getElementById('preview_text');
  const pb = document.getElementById('preview_box');
  const colorMap = {white:'#fff', yellow:'#FFD700', cyan:'#00FFFF'};
  pt.style.color = colorMap[color] || '#fff';
  pt.style.fontSize = size + 'px';
  pt.style.fontWeight = style === 'bold' ? 'bold' : 'normal';
  pt.style.fontStyle = style === 'italic' ? 'italic' : 'normal';
  if (bg === 'semi') pt.style.background = 'rgba(0,0,0,0.5)';
  else if (bg === 'black') pt.style.background = 'rgba(0,0,0,0.9)';
  else pt.style.background = 'transparent';
  pt.style.padding = bg !== 'none' ? '4px 8px' : '0';
  pt.style.borderRadius = bg !== 'none' ? '4px' : '0';
  pb.style.alignItems = position === 'top' ? 'flex-start' : position === 'middle' ? 'center' : 'flex-end';
}

async function extractLinks() {
  const url = document.getElementById('page_url').value;
  if (!url) return alert('URL দিন!');
  const btn = event.target;
  btn.textContent = '⏳ খোঁজা হচ্ছে...';
  btn.disabled = true;
  try {
    const res = await fetch('/extract', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url})
    });
    const data = await res.json();
    if (data.error) { alert('❌ Error: ' + data.error); return; }
    if (data.m3u8) document.getElementById('m3u8_url').value = data.m3u8;
    if (data.subtitle) {
      document.getElementById('subtitle_url').value = data.subtitle;
      switchTab('url');
    }
    if (!data.m3u8 && !data.subtitle) alert('কোনো লিংক পাওয়া যায়নি!');
    else alert('✅ লিংক পাওয়া গেছে!');
  } catch(e) {
    alert('❌ Error: ' + e.message);
  } finally {
    btn.textContent = '🔍 অটো এক্সট্র্যাক্ট';
    btn.disabled = false;
  }
}

async function startUpload() {
  const m3u8 = document.getElementById('m3u8_url').value;
  const title = document.getElementById('video_title').value;
  if (!m3u8) return alert('m3u8 URL দিন!');
  if (!title) return alert('ভিডিও টাইটেল দিন!');

  const formData = new FormData();
  formData.append('m3u8_url', m3u8);
  formData.append('subtitle_tab', currentTab);
  formData.append('title', title);
  formData.append('caption', document.getElementById('caption').value);
  formData.append('position', document.getElementById('position').value);
  formData.append('size', document.getElementById('font_size').value);
  formData.append('color', document.getElementById('font_color').value);
  formData.append('background', document.getElementById('background').value);
  formData.append('font', document.getElementById('font_name').value);
  const style = document.getElementById('font_style').value;
  formData.append('bold', style === 'bold' ? '1' : '0');
  formData.append('italic', style === 'italic' ? '1' : '0');

  if (currentTab === 'upload') {
    const file = document.getElementById('subtitle_file').files[0];
    if (!file) return alert('সাবটাইটেল ফাইল দিন!');
    formData.append('subtitle_file', file);
  } else if (currentTab === 'url') {
    const url = document.getElementById('subtitle_url').value;
    if (!url) return alert('সাবটাইটেল URL দিন!');
    formData.append('subtitle_url', url);
  } else {
    const file = document.getElementById('translate_file').files[0];
    const url = document.getElementById('translate_url').value;
    if (!file && !url) return alert('ইংরেজি সাবটাইটেল দিন!');
    if (file) formData.append('subtitle_file', file);
    if (url) formData.append('subtitle_url', url);
    formData.append('translate_engine', document.getElementById('translate_engine').value);
  }

  document.getElementById('upload_btn').disabled = true;
  document.getElementById('progress_section').classList.add('active');
  document.getElementById('result_box').style.display = 'none';
  document.getElementById('error_box').style.display = 'none';

  try {
    const res = await fetch('/upload', {method: 'POST', body: formData});
    const data = await res.json();
    currentTaskId = data.task_id;
    document.getElementById('task_id_display').textContent = '🔖 Task ID: ' + currentTaskId + ' (page বন্ধ করলেও চলবে)';
    startProgress(currentTaskId);
  } catch(e) {
    alert('❌ Error: ' + e.message);
    document.getElementById('upload_btn').disabled = false;
  }
}

function startProgress(taskId) {
  if (eventSource) eventSource.close();
  eventSource = new EventSource('/progress/' + taskId);
  eventSource.onmessage = function(e) {
    const data = JSON.parse(e.data);
    updateProgressUI(data);
    if (data.status === 'done' || data.status === 'error') {
      eventSource.close();
      document.getElementById('upload_btn').disabled = false;
    }
  };
}

function addLog(msg) {
  const box = document.getElementById('log_box');
  box.innerHTML += msg + '\n';
  box.scrollTop = box.scrollHeight;
}

function updateProgressUI(data) {
  const status = data.status;
  const msg = data.message;
  const progress = data.progress || 0;
  document.getElementById('status_msg').textContent = msg;
  document.getElementById('progress_bar').style.width = progress + '%';
  addLog(msg);
  const stepMap = {
    'starting': 1, 'downloading': 1,
    'translating': 2,
    'processing': 3,
    'uploading': 4,
    'done': 5
  };
  const currentStep = stepMap[status] || 1;
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('step' + i);
    el.classList.remove('active', 'done');
    if (i < currentStep) el.classList.add('done');
    else if (i === currentStep) el.classList.add('active');
    if (i < 5) {
      const line = document.getElementById('line' + i);
      line.classList.toggle('done', i < currentStep);
    }
  }
  if (status === 'done' && data.link) {
    document.getElementById('result_box').style.display = 'block';
    document.getElementById('result_link').href = data.link;
    document.getElementById('result_link').textContent = '📺 ' + data.link;
  }
  if (status === 'error') {
    const eb = document.getElementById('error_box');
    eb.style.display = 'block';
    eb.textContent = '❌ ' + (data.error || msg);
  }
}

// Check task status if returning to page
window.onload = function() {
  updatePreview();
  const savedTask = localStorage.getItem('anisub_task');
  if (savedTask) {
    const {taskId, time} = JSON.parse(savedTask);
    if (Date.now() - time < 3600000) {
      currentTaskId = taskId;
      document.getElementById('progress_section').classList.add('active');
      document.getElementById('task_id_display').textContent = '🔖 Task ID: ' + taskId;
      startProgress(taskId);
    }
  }
};

// Save task to check later
const origFetch = window.fetch;
</script>
</body>
</html>
